    --green:#3a9b6e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;font-family:var(--sans);}
  body{

  }

  .system-bar{
    position:fixed;top:0;left:0;right:0;height:34px;

  }
  .system-bar .sb-left{display:flex;align-items:center;gap:7px;font-weight:600;}
  .system-bar .sb-left svg{flex-shrink:0;}
  .system-bar .sb-center{font-family:var(--mono);color:#cfcfcf;font-size:12.5px;}
  .system-bar .sb-right{display:flex;align-items:center;gap:14px;color:#cfcfcf;}

  .desktop-icons{
    position:fixed;top:60px;left:24px;z-index:5;
    display:flex;flex-direction:column;gap:26px;
  }
  .desktop-icon{
    width:76px;text-align:center;color:#fff;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    user-select:none;
  }
  .desktop-icon svg{opacity:0.95;}
  .desktop-icon span{font-size:12.5px;text-shadow:0 1px 3px rgba(0,0,0,0.6);line-height:1.3;}
  .desktop-icon:hover span{text-decoration:underline;}

  .email-toast{
    position:fixed;top:46px;right:20px;
    background:rgba(30,32,38,0.92);color:#fff;
    border-radius:8px;padding:12px 18px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    cursor:pointer;z-index:60;
    opacity:0;transform:translateY(-8px);
    transition:opacity .35s ease, transform .35s ease;
    display:flex;align-items:center;gap:12px;
  }
  .email-toast.show{opacity:1;transform:translateY(0);}
  .email-toast .et-icon{
    width:34px;height:34px;border-radius:6px;background:#2b5fd9;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .email-toast .et-title{font-weight:700;font-size:14px;}
  .email-toast .et-sub{font-size:12px;color:#b9c3d6;}

  .browser-window{
    position:fixed;top:80px;left:50%;
    transform:translateX(-50%) scale(0.96);
    width:min(1040px, 92vw);height:min(720px, 82vh);
    background:#fff;border-radius:8px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
    display:none;flex-direction:column;
    z-index:70;
    opacity:0;transition:opacity .25s ease, transform .25s ease;

<script>
function getEmailTimestamps(){
  const now = new Date();
  const hrTime = new Date(now);
  hrTime.setHours(13, 30, 0, 0); // 1:30 PM
  const catTime = new Date(now);
  catTime.setHours(7, 42, 0, 0); // 7:42 AM
  return { hrTime, catTime };
}

function formatRelative(pastDate, now){
  let diffMs = now - pastDate;
  if (diffMs < 0) diffMs = 0; // email time is in the future relative to "now" — treat as just sent
  const totalMinutes = Math.floor(diffMs / 60000);
  if (totalMinutes < 1) return 'just now';
  if (totalMinutes < 60) return `${totalMinutes} minute${totalMinutes === 1 ? '' : 's'} ago`;
  const hours = Math.floor(totalMinutes / 60);
  const mins = totalMinutes % 60;
  if (mins === 0) return `${hours} hour${hours === 1 ? '' : 's'} ago`;
  return `${hours} hour${hours === 1 ? '' : 's'} ${mins} minute${mins === 1 ? '' : 's'} ago`;
}

function updateEmailTimeLabels(){
  const now = new Date();
  const { hrTime, catTime } = getEmailTimestamps();
  document.querySelectorAll('.time-hr').forEach(el => {
    el.textContent = `1:30 PM (${formatRelative(hrTime, now)})`;
  });
  document.querySelectorAll('.time-cat').forEach(el => {
    el.textContent = `7:42 AM (${formatRelative(catTime, now)})`;
  });
}

function updateSystemClock(){
  const now = new Date();
  const dateStr = now.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  const timeStr = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  document.getElementById('sysClock').textContent = `${dateStr}  •  ${timeStr}`;
}
updateSystemClock();
updateEmailTimeLabels();
setInterval(() => {
  updateSystemClock();
  updateEmailTimeLabels();
}, 1000);

function renderInbox(){
  document.getElementById('urlBox').textContent = 'https://www.pemail.com/mail/u/0/#inbox';
  document.getElementById('pemailMain').innerHTML = INBOX_VIEW;
  document.getElementById('rowHR').addEventListener('click', renderHR);
  document.getElementById('rowCat').addEventListener('click', renderCat);
}

function renderHR(){
  document.getElementById('urlBox').textContent = 'https://www.pemail.com/mail/u/0/#inbox/hr-provisioning';
  document.getElementById('pemailMain').innerHTML = HR_VIEW;
  document.getElementById('hrForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const first = document.getElementById('hrFirstName').value.trim();
    const last = document.getElementById('hrLastName').value.trim();
    const username = document.getElementById('hrUsername').value.trim();
    localStorage.setItem('qops_firstname', first || 'there');
    localStorage.setItem('qops_lastname', last);
    localStorage.setItem('qops_username', username);
    triggerFadeTransition();
  });
}

function renderCat(){
  document.getElementById('urlBox').textContent = 'https://www.pemail.com/mail/u/0/#inbox/cat-chronicles';
  document.getElementById('pemailMain').innerHTML = CAT_VIEW;
  document.getElementById('unsubLink').addEventListener('click', (e) => {
    e.preventDefault();
    showMiniToast("Nice try — this link's been broken since 2023. 😼");
  });
}

function showMiniToast(text){
  const el = document.getElementById('toastMini');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function openBrowser(){
  document.getElementById('browserWindow').classList.add('open');
  renderInbox();
}
function closeBrowser(){
  document.getElementById('browserWindow').classList.remove('open');
}

function triggerFadeTransition(){
  const overlay = document.getElementById('fadeOverlay');
  overlay.classList.add('active');
  setTimeout(() => {
    window.location.href = 'login.html';
  }, 850);
}

document.getElementById('iconInternet').addEventListener('click', openBrowser);
document.getElementById('browserCloseBtn').addEventListener('click', closeBrowser);
document.getElementById('backArrowBtn').addEventListener('click', renderInbox);
document.getElementById('inboxNavIcon').addEventListener('click', renderInbox);

setTimeout(() => {
  document.getElementById('emailToast').classList.add('show');
}, 2000);
document.getElementById('emailToast').addEventListener('click', () => {
  document.getElementById('emailToast').classList.remove('show');
  openBrowser();
});
</script>

</body>
</html>
